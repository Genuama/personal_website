    <nav>

        <a href="contacts.html">Contact</a>
    </nav>

    <main>
        <h1>Contact</h1>
        <p>Feel free to reach out — I'd love to connect!</p>

        <form class="contact-form" action="mailto:your@email.com" method="post" enctype="text/plain">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <div class="socials">
            <h2>Find me online</h2>
            <ul>
                <li><a href="https://github.com/genuama" target="_blank">GitHub</a></li>
                <li><a href="https://linkedin.com/in/amakkabrokwa" target="_blank">LinkedIn</a></li>
                <li><a href="amakkabrokwa19gmail.com">Email</a></li>
            </ul>
        </div>
    </main>
</body>
</html>
